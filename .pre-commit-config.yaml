repos:
  - repo: local
    hooks:
      - id: go-build
        name: go build
        language: system
        entry: go build -v ./...
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run
        pass_filenames: false
        types: [go]

      - id: make-generate
        name: make generate
        language: system
        entry: bash -c 'make generate && git diff --compact-summary --exit-code || (echo; echo "Unexpected difference after make generate. Commit the generated files."; exit 1)'
        pass_filenames: false
        stages: [pre-commit]